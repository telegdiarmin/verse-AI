<div class="content">
  <div class="heading">
    <div class="statusbar">
      <span class="username">{{ apiService.loggedInUser() ?? 'Nincs bejelentkezve' }}</span>
    </div>
    <img src="assets/heading2.png" />

    <vai-chip-list class="chip-list" [items]="apiService.registeredUsers()"></vai-chip-list>
  </div>

  <div class="content-aligner">
    <router-outlet></router-outlet>
  </div>
</div>

@let notification = notificationService.currentNotification();

@if (notification) {
  <div class="notification">
    <vai-snackbar
      [message]="notification.message"
      [notificationType]="notification.notificationType"
      (discard)="notificationService.discardNotification()"
    />
  </div>
}
