@if (multiline()) {
  <textarea
    #inputMultiline
    [placeholder]="placeholder()"
    [value]="value"
    (blur)="onTouched()"
    (input)="onInput(inputMultiline.value)"
    (keydown)="onKeydown.emit($event)"
    rows="3"
  ></textarea>
} @else {
  <input
    #inputSingleline
    [placeholder]="placeholder()"
    [value]="value"
    (blur)="onTouched()"
    (input)="onInput(inputSingleline.value)"
    (keydown)="onKeydown.emit($event)"
  />
}
